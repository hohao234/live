name: Sync Images to Cloudflare KV

on:
  push:
    branches:
      - main
    paths:
      - 'Images/**'            # 只有 Images 文件夹变动时才触发 push 同步
      - 'txt2m3u/sync_kv.py'
  schedule:
    - cron: '0 0 * * *'        # 每天北京时间上午 8 点运行
  workflow_dispatch:           # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 执行同步脚本
        env:
          KV_ACCOUNT_ID: ${{ secrets.KV_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          KV_API_TOKEN: ${{ secrets.KV_API_TOKEN }}
        run: |
          cd txt2m3u
          python sync_kv.py
