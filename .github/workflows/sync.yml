name: Sync KV to GitHub Images

on:
  schedule:
    - cron: '0 */6 * * *'  # 每 6 小时运行一次，保持同步
  workflow_dispatch:      # 允许你手动点击按钮立刻同步

jobs:
  sync_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # 必须有写权限

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 运行逆向同步脚本
        env:
          KV_ACCOUNT_ID: ${{ secrets.KV_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          KV_API_TOKEN: ${{ secrets.KV_API_TOKEN }}
        run: |
          python txt2m3u/sync_kv.py

      - name: 提交并推送变动
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Images/
          git commit -m "📊 同步 KV 变动到 GitHub [$(date '+%Y-%m-%d %H:%M')]" || exit 0
          git push
