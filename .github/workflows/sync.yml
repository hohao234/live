name: Daily Sync Images to KV

on:
  push:
    branches:
      - main
    paths:
      - 'Images/**'
  schedule:
    # 每天北京时间 08:30 运行 (UTC 00:30)
    - cron: '30 0 * * *'
  workflow_dispatch: # 允许随时手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装依赖
        run: pip install requests

      - name: 执行同步
        env:
          KV_ACCOUNT_ID: ${{ secrets.KV_ACCOUNT_ID }}
          KV_NAMESPACE_ID: ${{ secrets.KV_NAMESPACE_ID }}
          KV_API_TOKEN: ${{ secrets.KV_API_TOKEN }}
        run: |
          python txt2m3u/sync_kv.py
